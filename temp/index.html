<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Pet Name Generator | 项目入口</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f7;
      --fg: #1d1d1f;
      --muted: #6e6e73;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-on: #ffffff;
      --font-display: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --font-body: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
      --radius-lg: 18px;
      --radius-pill: 980px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: var(--surface);
      color: var(--fg);
      font-family: var(--font-body);
    }
    main {
      width: min(720px, calc(100% - 32px));
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: clamp(28px, 6vw, 56px);
      text-align: center;
    }
    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(36px, 7vw, 64px);
      line-height: 1.05;
      letter-spacing: -0.015em;
    }
    p {
      margin: 18px auto 32px;
      max-width: 52ch;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }
    a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: var(--accent-on);
      padding: 12px 20px;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main data-od-id="launcher">
    <h1 data-od-id="launcher-title">AI Pet Name Generator</h1>
    <p data-od-id="launcher-copy">项目入口已连接到独立落地页。主页面包含响应式营销内容和可交互的宠物名字生成器。</p>
    <a href="landing.html" data-od-id="launcher-link">打开网页</a>
  </main>
</body>
</html>
